services:
  backend:
    command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000", "--reload"]
    volumes:
      - ../apps/backend:/app
      - ../workers:/app/workers
      - ../packages:/app/packages
    environment:
      DEBUG: "true"

  worker:
    command: ["celery", "-A", "workers.celery_app", "worker", "--loglevel=debug", "--concurrency=1"]
    volumes:
      - ../apps/backend:/app
      - ../workers:/app/workers
      - ../packages:/app/packages

  frontend:
    command: ["npm", "run", "dev", "--", "--host", "0.0.0.0"]
    volumes:
      - ../apps/frontend:/app
      - /app/node_modules
