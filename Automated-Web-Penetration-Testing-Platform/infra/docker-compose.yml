services:
  frontend:
    build:
      context: ..
      dockerfile: apps/frontend/Dockerfile
    container_name: sentinel-frontend
    ports:
      - "5173:5173"
    environment:
      VITE_API_URL: ${VITE_API_URL:-http://localhost:8000}
    depends_on:
      - backend
    networks: [sentinel]

  backend:
    build:
      context: ..
      dockerfile: apps/backend/Dockerfile
    container_name: sentinel-backend
    env_file: ../.env
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - reports:/app/reports
    networks: [sentinel]

  worker:
    build:
      context: ..
      dockerfile: workers/Dockerfile.worker
    env_file: ../.env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      zap:
        condition: service_started
    volumes:
      - reports:/app/reports
    deploy:
      replicas: 2
    networks: [sentinel]

  postgres:
    image: postgres:16-alpine
    container_name: sentinel-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-sentinel}
      POSTGRES_USER: ${POSTGRES_USER:-sentinel}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-sentinel}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./scripts/init-db.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
      - ./scripts/seed-owasp.sql:/docker-entrypoint-initdb.d/02-seed.sql:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER:-sentinel}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks: [sentinel]

  redis:
    image: redis:7-alpine
    container_name: sentinel-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks: [sentinel]

  zap:
    image: ghcr.io/zaproxy/zaproxy:stable
    container_name: sentinel-zap
    command: >
      zap.sh -daemon -host 0.0.0.0 -port 8080
      -config api.addrs.addr.name=.*
      -config api.addrs.addr.regex=true
      -config api.key=${ZAP_API_KEY:-changeme}
    ports:
      - "8080:8080"
    networks: [sentinel]

  nginx:
    image: nginx:1.27-alpine
    container_name: sentinel-nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/sentinel.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - frontend
      - backend
    networks: [sentinel]

volumes:
  pgdata:
  reports:

networks:
  sentinel:
    driver: bridge
